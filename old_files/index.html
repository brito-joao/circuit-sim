<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JSON-Driven Digital Logic Simulator</title>
<style>
    :root {
        --bg-dark: #1e272e;
        --panel-bg: #2f3640;
        --text-light: #ecf0f1;
        --accent: #00a8ff;
        --wire-hover: #fbc531;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-dark);
        color: var(--text-light);
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
    }
    header {
        background-color: var(--panel-bg);
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid var(--accent);
    }
    header h1 { margin: 0; font-size: 1.5rem; font-weight: 400; }
    .controls button {
        background-color: var(--accent);
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
        margin-left: 10px;
        transition: background 0.2s;
    }
    .controls button:hover { background-color: #0097e6; }
    .controls button.active { background-color: #e84118; }
    
    .main-workspace {
        display: flex;
        flex: 1;
        overflow: hidden;
    }
    
    /* Left Panel: Simulator */
    .sim-panel {
        flex: 2;
        position: relative;
        overflow: auto;
        padding: 20px;
        background-color: #dcdde1; /* Desk color */
    }
    svg {
        display: block;
        margin-bottom: 20px;
        filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
    }
    
    /* Right Panel: JSON Editor */
    .code-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        background-color: var(--panel-bg);
        border-left: 2px solid #576574;
    }
    .code-header {
        padding: 10px;
        background: #353b48;
        font-weight: bold;
        font-size: 0.9rem;
    }
    textarea {
        flex: 1;
        background-color: #2f3640;
        color: #00cec9;
        font-family: monospace;
        font-size: 14px;
        border: none;
        padding: 15px;
        resize: none;
        outline: none;
    }

    /* Tooltip / Details Box */
    #details-box {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: rgba(0,0,0,0.8);
        padding: 15px;
        border-radius: 8px;
        border-left: 4px solid var(--accent);
        display: none;
        pointer-events: none;
    }
    #details-box h3 { margin: 0 0 5px 0; font-size: 14px; color: var(--accent); }
    #details-box p { margin: 0; font-size: 12px; }

    /* SVG Interactive Elements */
    .wire { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-width 0.2s, stroke 0.1s; cursor: pointer;}
    .wire:hover { stroke-width: 7; filter: drop-shadow(0 0 5px var(--wire-hover)); }
    .wire.high { filter: drop-shadow(0 0 3px currentColor); }
    .switch-rect { cursor: pointer; transition: fill 0.2s; }
    .switch-rect:hover { stroke: #fff; stroke-width: 2; }
    .led-circle { transition: fill 0.1s; }
    
    /* Base SVG Styles */
    .bb-body { fill: #f5f6fa; }
    .bb-trench { fill: #c8d6e5; }
    .hole { fill: #2f3640; }
    .rail-red { stroke: #e84118; stroke-width: 3; }
    .rail-blue { stroke: #0097e6; stroke-width: 3; }
    .ic-body { fill: #2f3640; rx: 4; ry: 4; }
    .ic-notch { fill: #f5f6fa; }
    .ic-pin { fill: silver; }
    .ic-text { fill: #f5f6fa; font-family: monospace; font-size: 14px; font-weight: bold; text-anchor: middle;}
</style>
</head>
<body>

<header>
    <h1>JSON-Driven Digital Simulator</h1>
    <div class="controls">
        <span id="status" style="margin-right: 20px; color: #4cd137;">Stopped</span>
        <button id="btn-compile" onclick="compileAndBuild()">Compile JSON</button>
        <button id="btn-play" onclick="toggleSimulation()">▶ Run Simulation</button>
    </div>
</header>

<div class="main-workspace">
    <div class="sim-panel" id="sim-container">
        <div id="details-box">
            <h3 id="det-title">Item</h3>
            <p id="det-desc">Details...</p>
        </div>
    </div>

    <div class="code-panel">
        <div class="code-header">Circuit Blueprint (JSON)</div>
        <textarea id="json-input" spellcheck="false"></textarea>
    </div>
</div>

<script>
// ==========================================
// 1. UNDER THE HOOD: COMPONENT LIBRARY
// ==========================================
const ComponentLibrary = {
    "74LS00": {
        name: "Quad 2-In NAND",
        pins: 14,
        eval: (pins) => {
            const nand = (a, b) => (a === 1 && b === 1) ? 0 : 1;
            pins[3] = nand(pins[1], pins[2]);
            pins[6] = nand(pins[4], pins[5]);
            pins[8] = nand(pins[9], pins[10]);
            pins[11] = nand(pins[12], pins[13]);
        }
    },
    "74LS08": {
        name: "Quad 2-In AND",
        pins: 14,
        eval: (pins) => {
            const and = (a, b) => (a === 1 && b === 1) ? 1 : 0;
            pins[3] = and(pins[1], pins[2]);
            pins[6] = and(pins[4], pins[5]);
            pins[8] = and(pins[9], pins[10]);
            pins[11] = and(pins[12], pins[13]);
        }
    },
    "74LS32": {
        name: "Quad 2-In OR",
        pins: 14,
        eval: (pins) => {
            const or = (a, b) => (a === 1 || b === 1) ? 1 : 0;
            pins[3] = or(pins[1], pins[2]);
            pins[6] = or(pins[4], pins[5]);
            pins[8] = or(pins[9], pins[10]);
            pins[11] = or(pins[12], pins[13]);
        }
    }
};

// ==========================================
// 2. SIMULATION ENGINE
// ==========================================
let simData = {};
let pinStates = {}; // Holds the logic state (0 or 1) of every addressable pin/net
let simInterval = null;
let isRunning = false;

// Default JSON (Dynamic SR Latch)
const defaultJSON = {
  "boards": 1,
  "chips": [
    { "id": "U1", "type": "74LS00", "board": 0, "col": 15 }
  ],
  "inputs": [
    { "id": "SW_S", "label": "Set (S)", "board": 0, "col": 5, "state": 0 },
    { "id": "SW_R", "label": "Reset (R)", "board": 0, "col": 8, "state": 0 },
    { "id": "SW_EN", "label": "Enable", "board": 0, "col": 11, "state": 1 }
  ],
  "outputs": [
    { "id": "LED_QH", "label": "Q_High", "board": 0, "col": 35 },
    { "id": "LED_QL", "label": "Q_Low", "board": 0, "col": 39 }
  ],
  "wires": [
    { "id": "w_vcc", "from": "VCC", "to": "U1.14", "color": "#e84118" },
    { "id": "w_gnd", "from": "GND", "to": "U1.7", "color": "#2f3640" },
    { "id": "w_s", "from": "SW_S", "to": "U1.9", "color": "#fd79a8" },
    { "id": "w_r", "from": "SW_R", "to": "U1.13", "color": "#00b894" },
    { "id": "w_en1", "from": "SW_EN", "to": "U1.10", "color": "#6c5ce7" },
    { "id": "w_en2", "from": "SW_EN", "to": "U1.12", "color": "#6c5ce7" },
    { "id": "w_internal1", "from": "U1.8", "to": "U1.1", "color": "#e1b12c" },
    { "id": "w_internal2", "from": "U1.11", "to": "U1.5", "color": "#e1b12c" },
    { "id": "w_cross1", "from": "U1.3", "to": "U1.4", "color": "#ffffff" },
    { "id": "w_cross2", "from": "U1.6", "to": "U1.2", "color": "#00cec9" },
    { "id": "w_out1", "from": "U1.3", "to": "LED_QH", "color": "#4cd137" },
    { "id": "w_out2", "from": "U1.6", "to": "LED_QL", "color": "#0984e3" }
  ]
};

document.getElementById('json-input').value = JSON.stringify(defaultJSON, null, 2);

function compileAndBuild() {
    try {
        simData = JSON.parse(document.getElementById('json-input').value);
        pinStates = { "VCC": 1, "GND": 0 }; // Initialize Power
        
        // Initialize Inputs
        if(simData.inputs) {
            simData.inputs.forEach(inp => { pinStates[inp.id] = inp.state; });
        }
        
        drawBreadboards();
        document.getElementById('status').innerText = "Compiled successfully.";
        document.getElementById('status').style.color = "#4cd137";
        
        if(isRunning) evaluateLogic(); // Evaluate once immediately if running
    } catch (e) {
        document.getElementById('status').innerText = "JSON Error: " + e.message;
        document.getElementById('status').style.color = "#e84118";
    }
}

function toggleSimulation() {
    const btn = document.getElementById('btn-play');
    if(isRunning) {
        clearInterval(simInterval);
        isRunning = false;
        btn.innerText = "▶ Run Simulation";
        btn.classList.remove('active');
        document.getElementById('status').innerText = "Stopped";
    } else {
        // Run logic evaluation 10 times a second
        simInterval = setInterval(evaluateLogic, 100);
        isRunning = true;
        btn.innerText = "⏸ Stop Simulation";
        btn.classList.add('active');
        document.getElementById('status').innerText = "Running...";
    }
}

// The Core Logic Solver
function evaluateLogic() {
    // 1. Propagate signals through wires (Source -> Destination)
    if(simData.wires) {
        simData.wires.forEach(w => {
            if(pinStates[w.from] !== undefined) {
                pinStates[w.to] = pinStates[w.from];
            }
        });
    }

    // 2. Evaluate all Chips
    if(simData.chips) {
        simData.chips.forEach(chip => {
            const lib = ComponentLibrary[chip.type];
            if(lib) {
                // Build an array of the chip's current pin states
                let pins = [];
                for(let p = 1; p <= lib.pins; p++) {
                    pins[p] = pinStates[`${chip.id}.${p}`] || 0;
                }
                
                // Evaluate internal logic
                lib.eval(pins);
                
                // Write output results back to pinStates
                for(let p = 1; p <= lib.pins; p++) {
                    pinStates[`${chip.id}.${p}`] = pins[p];
                }
            }
        });
    }

    // 3. Propagate wires AGAIN to ensure chip outputs reach LEDs in the same tick
    if(simData.wires) {
        simData.wires.forEach(w => {
            if(pinStates[w.from] !== undefined) {
                pinStates[w.to] = pinStates[w.from];
            }
        });
    }

    updateVisuals();
}

function updateVisuals() {
    // Update LEDs
    if(simData.outputs) {
        simData.outputs.forEach(out => {
            const el = document.getElementById(`svg-${out.id}`);
            if(el) {
                el.style.fill = pinStates[out.id] === 1 ? '#ff4757' : '#2f3640';
            }
        });
    }
    
    // Update Wires (Optional: Make high wires brighter)
    if(simData.wires) {
        simData.wires.forEach(w => {
            const el = document.getElementById(`svg-${w.id}`);
            if(el) {
                if(pinStates[w.from] === 1) {
                    el.style.opacity = "1";
                    el.classList.add('high');
                } else {
                    el.style.opacity = "0.4";
                    el.classList.remove('high');
                }
            }
        });
    }
}

function handleInputClick(inputId) {
    if(!isRunning) return;
    const inp = simData.inputs.find(i => i.id === inputId);
    if(inp) {
        inp.state = inp.state === 1 ? 0 : 1; // Toggle
        pinStates[inputId] = inp.state;
        
        // Update graphics
        const rect = document.getElementById(`svg-rect-${inputId}`);
        const text = document.getElementById(`svg-txt-${inputId}`);
        if(inp.state === 1) {
            rect.style.fill = "#4cd137";
            text.textContent = "1";
        } else {
            rect.style.fill = "#e84118";
            text.textContent = "0";
        }
        
        evaluateLogic(); // Force instant evaluation
    }
}

function showDetails(title, desc) {
    const box = document.getElementById('details-box');
    document.getElementById('det-title').innerText = title;
    document.getElementById('det-desc').innerText = desc;
    box.style.display = 'block';
}
function hideDetails() {
    document.getElementById('details-box').style.display = 'none';
}


// ==========================================
// 3. SVG GENERATION ENGINE
// ==========================================
function drawBreadboards() {
    const container = document.getElementById('sim-container');
    const numBoards = simData.boards || 1;
    
    let html = '';
    const boardWidth = 1100;
    const boardHeight = 350;
    
    html += `<svg width="${boardWidth}" height="${boardHeight * numBoards}" viewBox="0 0 ${boardWidth} ${boardHeight * numBoards}">`;

    // A. Draw Boards
    for(let b = 0; b < numBoards; b++) {
        let offsetY = b * boardHeight;
        
        // Board Base
        html += `<rect class="bb-body" x="20" y="${offsetY + 20}" width="1060" height="310" rx="10" ry="10" />`;
        html += `<line class="rail-red" x1="40" y1="${offsetY + 40}" x2="1060" y2="${offsetY + 40}" />`;
        html += `<line class="rail-blue" x1="40" y1="${offsetY + 65}" x2="1060" y2="${offsetY + 65}" />`;
        html += `<rect class="bb-trench" x="40" y="${offsetY + 160}" width="1020" height="30" />`;
        html += `<line class="rail-blue" x1="40" y1="${offsetY + 285}" x2="1060" y2="${offsetY + 285}" />`;
        html += `<line class="rail-red" x1="40" y1="${offsetY + 310}" x2="1060" y2="${offsetY + 310}" />`;

        // Holes
        for(let col = 1; col <= 50; col++) {
            let cx = 40 + (col * 20);
            // Power Rails Top
            html += `<circle class="hole" cx="${cx}" cy="${offsetY + 40}" r="3" />`;
            html += `<circle class="hole" cx="${cx}" cy="${offsetY + 65}" r="3" />`;
            // Main Matrix
            for(let row = 0; row < 5; row++) {
                html += `<circle class="hole" cx="${cx}" cy="${offsetY + 90 + (row*14)}" r="3" />`;
                html += `<circle class="hole" cx="${cx}" cy="${offsetY + 200 + (row*14)}" r="3" />`;
            }
            // Power Rails Bottom
            html += `<circle class="hole" cx="${cx}" cy="${offsetY + 285}" r="3" />`;
            html += `<circle class="hole" cx="${cx}" cy="${offsetY + 310}" r="3" />`;
        }
    }

    // Helper to get X, Y coordinates for any pin/component
    const getCoords = (target) => {
        if(target === "VCC") return { x: 20, y: 40 }; // Default top red rail start
        if(target === "GND") return { x: 20, y: 65 }; // Default top blue rail start
        
        // Is it an input?
        const inp = simData.inputs && simData.inputs.find(i => i.id === target);
        if(inp) return { x: 40 + (inp.col * 20), y: (inp.board * boardHeight) + 146 };

        // Is it an output?
        const out = simData.outputs && simData.outputs.find(o => o.id === target);
        if(out) return { x: 40 + (out.col * 20), y: (out.board * boardHeight) + 146 };

        // Is it a chip pin? (e.g., "U1.14")
        if(target.includes('.')) {
            const [chipId, pinStr] = target.split('.');
            const pin = parseInt(pinStr);
            const chip = simData.chips && simData.chips.find(c => c.id === chipId);
            if(chip) {
                const lib = ComponentLibrary[chip.type] || {pins: 14};
                const pinsPerSide = lib.pins / 2;
                const offsetY = chip.board * boardHeight;
                
                if(pin <= pinsPerSide) {
                    // Bottom row (Pins 1 to 7)
                    return { x: 40 + ((chip.col + pin - 1) * 20), y: offsetY + 200 };
                } else {
                    // Top row (Pins 14 to 8, going right to left)
                    const reversePin = lib.pins - pin;
                    return { x: 40 + ((chip.col + reversePin) * 20), y: offsetY + 146 };
                }
            }
        }
        return {x: 0, y: 0};
    };

    // B. Draw Inputs (Switches)
    if(simData.inputs) {
        simData.inputs.forEach(inp => {
            const coords = getCoords(inp.id);
            const color = inp.state === 1 ? '#4cd137' : '#e84118';
            const txt = inp.state === 1 ? '1' : '0';
            html += `<rect id="svg-rect-${inp.id}" class="switch-rect" x="${coords.x - 8}" y="${coords.y - 45}" width="16" height="30" rx="3" fill="${color}" onclick="handleInputClick('${inp.id}')" onmouseenter="showDetails('Input: ${inp.id}', 'Label: ${inp.label}\\nClick to toggle state.')" onmouseleave="hideDetails()"/>`;
            html += `<text id="svg-txt-${inp.id}" x="${coords.x}" y="${coords.y - 25}" fill="white" font-size="12" font-family="monospace" text-anchor="middle" pointer-events="none">${txt}</text>`;
            html += `<text x="${coords.x}" y="${coords.y - 55}" fill="#2f3640" font-size="12" font-weight="bold" text-anchor="middle">${inp.label}</text>`;
        });
    }

    // C. Draw Outputs (LEDs)
    if(simData.outputs) {
        simData.outputs.forEach(out => {
            const coords = getCoords(out.id);
            html += `<circle id="svg-${out.id}" class="led-circle" cx="${coords.x}" cy="${coords.y - 20}" r="10" fill="#2f3640" stroke="silver" stroke-width="2" onmouseenter="showDetails('Output: ${out.id}', 'Label: ${out.label}\\nLights up when High (1).')" onmouseleave="hideDetails()"/>`;
            html += `<text x="${coords.x}" y="${coords.y - 40}" fill="#2f3640" font-size="12" font-weight="bold" text-anchor="middle">${out.label}</text>`;
        });
    }

    // D. Draw Chips
    if(simData.chips) {
        simData.chips.forEach(chip => {
            const lib = ComponentLibrary[chip.type] || {pins: 14};
            const pinsPerSide = lib.pins / 2;
            const offsetY = chip.board * boardHeight;
            const startX = 40 + (chip.col * 20) - 10;
            const width = pinsPerSide * 20;
            
            html += `<rect class="ic-body" x="${startX}" y="${offsetY + 130}" width="${width}" height="90" onmouseenter="showDetails('Chip: ${chip.id}', 'Type: ${chip.type}\\n${ComponentLibrary[chip.type] ? ComponentLibrary[chip.type].name : 'Unknown Logic'}')" onmouseleave="hideDetails()"/>`;
            html += `<path class="ic-notch" d="M ${startX} ${offsetY+165} A 10 10 0 0 1 ${startX} ${offsetY+185} L ${startX-2} ${offsetY+185} L ${startX-2} ${offsetY+165} Z" />`;
            html += `<text class="ic-text" x="${startX + width/2}" y="${offsetY + 175}">${chip.type}</text>`;
            html += `<text class="ic-text" x="${startX + width/2}" y="${offsetY + 195}" font-size="11" fill="silver">${chip.id}</text>`;
        });
    }

    // E. Draw Wires (Bezier Curves for natural look)
    if(simData.wires) {
        simData.wires.forEach(w => {
            const c1 = getCoords(w.from);
            const c2 = getCoords(w.to);
            // Add a bit of vertical slack to the curve based on distance
            const slack = Math.abs(c1.x - c2.x) * 0.3 + 20;
            const d = `M ${c1.x} ${c1.y} C ${c1.x} ${c1.y - slack}, ${c2.x} ${c2.y - slack}, ${c2.x} ${c2.y}`;
            
            html += `<path id="svg-${w.id}" class="wire" d="${d}" stroke="${w.color || '#9c88ff'}" onmouseenter="showDetails('Wire: ${w.id}', 'From: ${w.from}\\nTo: ${w.to}')" onmouseleave="hideDetails()"/>`;
        });
    }

    html += `</svg>`;
    
    // Inject the final HTML into the container (preserving the tooltip box)
    const containerEl = document.getElementById('sim-container');
    const tooltipHTML = containerEl.querySelector('#details-box').outerHTML;
    containerEl.innerHTML = html + tooltipHTML;
}

// Boot up
compileAndBuild();

</script>
</body>
</html>
